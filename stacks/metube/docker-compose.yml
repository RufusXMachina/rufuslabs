services:
  metube:
    image: alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - 3087:8081
    environment:
      - UID=1000
      - GID=1000
      - STATE_DIR=/config
      - DOWNLOAD_DIR=/downloads
    volumes:
      - ./config:/config
      - /mnt/media/data/media/YouTube:/downloads